<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubungi Kami - Warung Sayur</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="warung-body">

    <nav class="navbar">
        <h2 style="color: #f1c40f;">🥬 Warung Sayur Saya</h2>
        <div>
            <a href="warung.html" style="color: white; text-decoration: none; margin-right: 20px;">Kembali Belanja</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 50px;">
        <div class="login-header">
            <h2 style="color: white;">Hubungi Admin</h2>
            <i class="fab fa-whatsapp fa-2xl" style="color: #2ecc71;"></i>
        </div>

        <div class="inner-box">
            <p style="color: #999; font-size: 13px; margin-bottom: 20px;">Punya pertanyaan? Kirim pesan langsung ke WA kami.</p>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="namaUser" placeholder="Nama Anda" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-envelope" style="top: 25px;"></i>
                <textarea id="pesanUser" placeholder="Tulis pesan Anda di sini..." style="width: 100%; height: 100px; background: #121212; border: 1px solid #444; border-radius: 8px; color: white; padding: 12px 15px 12px 45px; outline: none;"></textarea>
            </div>

            <button onclick="kirimPesan()" class="btn-buy" style="background: #27ae60;">
                <i class="fab fa-whatsapp"></i> Kirim Pesan
            </button>
        </div>
    </div>

    <script>
        function kirimPesan() {
            const nama = document.getElementById('namaUser').value;
            const pesan = document.getElementById('pesanUser').value;
            const phone = "6289630435961";

            if(nama === "" || pesan === "") {
                alert("Isi nama dan pesan dulu ya!");
                return;
            }

            const teks = `*TANYA ADMIN*\nNama: ${nama}\nPesan: ${pesan}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(teks)}`, '_blank');
        }
    </script>
</body>
</html>
